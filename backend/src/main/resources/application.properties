spring.application.name=cosmic-objects-analyzer

# Konfiguracja bazy danych PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:1234/cosmicdb
spring.datasource.username=postgres
spring.datasource.password=kamil2003

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
